<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lancelot Cavalec | Portfolio Cinématographique</title>
    
    <!-- Scripts CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@11.0.25/dist/framer-motion.js"></script>
    <!-- GSAP & ScrollTrigger - Les fondations de la rotation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        html { scroll-behavior: smooth; }
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            color: white;
        }

        ::-webkit-scrollbar { width: 0px; background: transparent; }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(34, 211, 238, 0.2);
            border-top-color: #22d3ee;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        video {
            object-fit: cover;
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            /* Force l'accélération GPU */
            will-change: transform, contents;
            pointer-events: none;
            /* Valeur par défaut (paysage) : garde une petite marge cinématique */
            transform: scale(0.8) translateZ(0);
        }

        /* --- ADAPTATION VERTICALE (SMARTPHONE) --- */
        @media (orientation: portrait) {
            video {
                /* On élargit au maximum (échelle 1.0) pour coller aux bords et supprimer les bandes noires */
                transform: scale(1.0) translateZ(0) !important;
            }
        }

        @media (max-width: 640px) {
            .nav-link { font-size: 9px; letter-spacing: 0.1em; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence, useScroll, useSpring } = Motion;

        const Loader2 = ({ className }) => <div className={`spinner ${className}`} />;

        // Enregistrement de GSAP indispensable
        gsap.registerPlugin(ScrollTrigger);

        const projectsData = [
            { id: 1, title: "Séquence Poursuite", client: "Automobile", img: "https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&q=80&w=800", description: "Capture haute vitesse en FPV pour une marque de luxe.", visuals: [{ type: 'image', url: "https://images.unsplash.com/photo-1544636331-e26879cd4d9b?auto=format&fit=crop&q=80&w=1200" }] },
            { id: 2, title: "L'Art du Design", client: "Luxury Home", img: "https://images.unsplash.com/photo-1600585154340-be6199f7d200?auto=format&fit=crop&q=80&w=800", description: "Mise en avant d'une villa d'architecte.", visuals: [{ type: 'image', url: "https://images.unsplash.com/photo-1613490493576-7fde63acd811?auto=format&fit=crop&q=80&w=1200" }] },
            { id: 3, title: "Horizon Brut", client: "Documentaire", img: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=1200", description: "Projet de conservation naturelle.", visuals: [{ type: 'image', url: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=1200" }] },
            { id: 4, title: "Urban Flow", client: "Lifestyle", img: "https://images.unsplash.com/photo-1449824913935-59a10b8d2000?auto=format&fit=crop&q=80&w=1200", description: "L'énergie de la ville capturée de nuit.", visuals: [{ type: 'image', url: "https://images.unsplash.com/photo-1449824913935-59a10b8d2000?auto=format&fit=crop&q=80&w=1200" }] }
        ];

        // --- COMPOSANT VIDÉO AVEC GSAP ---
        const VideoScrollBackground = ({ isVisible }) => {
            const videoRef = useRef(null);
            const [status, setStatus] = useState('loading');

            useEffect(() => {
                const video = videoRef.current;
                if (!video) return;

                const setupGSAPRotation = () => {
                    if (!video.duration || isNaN(video.duration)) return;

                    // Nettoyage complet pour éviter les conflits
                    ScrollTrigger.getAll().forEach(t => t.kill());

                    // MÉTHODE PROXY : On anime une valeur "virtuelle" que l'on applique à la vidéo
                    const proxy = { time: 0 };
                    
                    gsap.to(proxy, {
                        time: video.duration,
                        ease: "none", 
                        scrollTrigger: {
                            trigger: "body",
                            start: "top top",
                            end: "bottom bottom",
                            scrub: 1.5, 
                            onUpdate: () => {
                                if (video.readyState >= 2) {
                                    video.currentTime = proxy.time;
                                }
                            }
                        }
                    });
                    setStatus('ready');
                };

                video.addEventListener('loadedmetadata', setupGSAPRotation);
                video.addEventListener('canplaythrough', setupGSAPRotation);
                
                if (video.readyState >= 1) setupGSAPRotation();

                const bootstrap = () => {
                    video.play().then(() => {
                        video.pause();
                        setupGSAPRotation();
                    }).catch(() => {});
                    window.removeEventListener('scroll', bootstrap);
                    window.removeEventListener('click', bootstrap);
                };
                window.addEventListener('scroll', bootstrap, { once: true });
                window.addEventListener('click', bootstrap, { once: true });

                return () => {
                    video.removeEventListener('loadedmetadata', setupGSAPRotation);
                    video.removeEventListener('canplaythrough', setupGSAPRotation);
                    ScrollTrigger.getAll().forEach(t => t.kill());
                };
            }, [isVisible]);

            return (
                <div className={`fixed inset-0 z-0 bg-black pointer-events-none overflow-hidden transition-opacity duration-1000 ${isVisible ? 'opacity-100' : 'opacity-20'}`}>
                    <div className="absolute inset-0 bg-black/50 z-10" />
                    <video
                        ref={videoRef}
                        muted
                        playsInline
                        webkit-playsinline="true"
                        preload="auto"
                        crossOrigin="anonymous"
                        className="w-full h-full object-cover"
                        style={{ filter: 'contrast(1.1) brightness(0.8)' }}
                    >
                        <source src="https://wjjb8vn2j05qchai.public.blob.vercel-storage.com/3D_Drone_Animation_gzR_53Lh.mp4" type="video/mp4" />
                    </video>
                    {status === 'loading' && (
                        <div className="absolute inset-0 flex flex-col items-center justify-center z-20 bg-black">
                            <Loader2 className="w-10 h-10 mb-4" />
                        </div>
                    )}
                </div>
            );
        };

        const ProjectPage = ({ project, onBack }) => {
            useEffect(() => { window.scrollTo(0, 0); }, []);
            return (
                <motion.div initial={{ opacity: 0, y: 30 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -30 }}
                    className="relative z-[200] min-h-screen bg-black/95 backdrop-blur-md px-6 md:px-20 pt-32 pb-40">
                    <button onClick={onBack} className="flex items-center gap-3 text-gray-500 hover:text-white transition-colors mb-16 uppercase font-bold text-xs tracking-widest">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
                        Retour au Portfolio
                    </button>
                    <div className="max-w-6xl mx-auto">
                        <header className="mb-24 text-center md:text-left">
                            <span className="text-cyan-400 font-mono text-xs uppercase tracking-[0.5em] mb-4 block">{project.client}</span>
                            <h1 className="text-5xl md:text-8xl font-black italic uppercase tracking-tighter mb-8">{project.title}</h1>
                            <p className="text-gray-400 text-lg md:text-xl max-w-3xl leading-relaxed italic font-light mx-auto md:mx-0">{project.description}</p>
                        </header>
                        <div className="grid grid-cols-1 gap-12">
                            {project.visuals.map((v, i) => (
                                <img key={i} src={v.url} className="w-full rounded-sm border border-white/5 shadow-2xl" />
                            ))}
                        </div>
                    </div>
                </motion.div>
            );
        };

        function App() {
            const [selectedProject, setSelectedProject] = useState(null);
            const { scrollYProgress } = useScroll();
            const scaleProgress = useSpring(scrollYProgress, { stiffness: 100, damping: 30 });

            return (
                <div className="bg-black text-white min-h-screen font-sans selection:bg-cyan-500 overflow-x-hidden">
                    <VideoScrollBackground isVisible={!selectedProject} />
                    <AnimatePresence mode="wait">
                        {!selectedProject ? (
                            <motion.div key="main" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
                                <motion.div className="fixed top-0 left-0 right-0 h-1 bg-cyan-400 z-[100] origin-left shadow-[0_0_15px_#22d3ee]" style={{ scaleX: scaleProgress }} />
                                
                                <nav className="fixed top-0 w-full z-[60] px-4 md:px-8 py-6 flex justify-between items-center backdrop-blur-md bg-black/30">
                                    <div className="flex items-center">
                                        <a href="#" className="text-xl md:text-2xl font-black tracking-tighter uppercase italic">LANCELOT<span className="text-cyan-400 ml-1">Cavalec</span></a>
                                    </div>
                                    <div className="flex gap-4 md:gap-10 text-[9px] md:text-[11px] font-bold uppercase tracking-[0.1em] md:tracking-[0.3em] text-gray-400">
                                        <a href="#showreel" className="hover:text-white transition-colors">Showreel</a>
                                        <a href="#portfolio" className="hover:text-white transition-colors">Portfolio</a>
                                        <a href="#contact" className="hover:text-white transition-colors">Contact</a>
                                    </div>
                                </nav>

                                <section id="vision" className="relative h-screen flex flex-col items-center justify-center text-center px-4">
                                    <motion.div initial={{ opacity: 0, y: 40 }} animate={{ opacity: 1, y: 0 }}>
                                        <h1 className="text-5xl md:text-8xl lg:text-[10rem] font-black mb-10 tracking-tighter uppercase leading-[0.85] bg-clip-text text-transparent bg-gradient-to-t from-blue-700 to-cyan-400">
                                            <span className="flex flex-col sm:flex-row gap-x-4 md:gap-x-6 items-center justify-center"><span>PUSH</span><span>THE</span></span>
                                            <span className="italic">LIMITS</span>
                                        </h1>
                                        <div className="flex flex-col sm:flex-row gap-4 md:gap-6 justify-center items-center">
                                            <a href="#showreel" className="w-64 md:w-72 py-4 md:py-5 border border-cyan-400 text-cyan-400 font-black uppercase text-[10px] md:text-xs hover:bg-cyan-400 hover:text-black transition-all text-center">Lancer le Showreel</a>
                                            <a href="#portfolio" className="w-64 md:w-72 py-4 md:py-5 border border-white/20 text-white font-black uppercase text-[10px] md:text-xs hover:bg-white hover:text-black transition-all text-center">Mon portfolio</a>
                                        </div>
                                        
                                        <div className="flex justify-center gap-8 mt-12">
                                            <a href="https://www.instagram.com/lancelot_production" target="_blank" className="text-gray-500 hover:text-cyan-400 transition-all hover:scale-110">
                                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
                                            </a>
                                            <a href="https://youtube.com/@lancelotprod" target="_blank" className="text-gray-500 hover:text-red-500 transition-all hover:scale-110">
                                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M2.5 17a24.12 24.12 0 0 1 0-10 2 2 0 0 1 2-2 103.03 103.03 0 0 1 15 0 2 2 0 0 1 2 2 24.12 24.12 0 0 1 0 10 2 2 0 0 1-2 2 103.03 103.03 0 0 1-15 0 2 2 0 0 1-2-2z"/><path d="m10 15 5-3-5-3z"/></svg>
                                            </a>
                                            <a href="https://www.linkedin.com/in/lancelot-cavalec" target="_blank" className="text-gray-500 hover:text-blue-500 transition-all hover:scale-110">
                                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>
                                            </a>
                                        </div>
                                    </motion.div>
                                </section>

                                <section id="showreel" className="pt-40 pb-24 px-6 md:px-20 bg-black/40 backdrop-blur-sm relative z-10">
                                    <div className="max-w-7xl mx-auto">
                                        <div className="mb-16">
                                            <h2 className="text-4xl md:text-6xl font-black italic uppercase tracking-tighter">
                                                SHOW <span className="text-cyan-400">REEL</span>
                                            </h2>
                                        </div>
                                        <div className="group relative aspect-video w-full overflow-hidden border border-white/5 shadow-2xl bg-zinc-900 cursor-pointer">
                                            <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?auto=format&fit=crop&q=80&w=1200" className="w-full h-full object-cover opacity-50 group-hover:opacity-70 transition-opacity" />
                                            <div className="absolute inset-0 flex items-center justify-center">
                                                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                <section id="portfolio" className="pt-32 pb-40 bg-black/40 backdrop-blur-sm px-6 md:px-20 relative z-10">
                                    <div className="max-w-7xl mx-auto">
                                        <h2 className="text-4xl md:text-6xl font-black italic uppercase tracking-tighter mb-16">
                                            PORT<span className="text-cyan-400">FOLIO</span>
                                        </h2>
                                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
                                            {projectsData.map((p, i) => (
                                                <div key={i} onClick={() => setSelectedProject(p)} className="relative aspect-[4/5] group bg-black overflow-hidden border border-white/5 cursor-pointer rounded-sm">
                                                    <img src={p.img} className="w-full h-full object-cover opacity-40 group-hover:opacity-100 transition-all duration-1000" />
                                                    <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent p-6 flex flex-col justify-end">
                                                        <span className="text-cyan-400 font-mono text-[8px] uppercase tracking-widest mb-1 font-bold">{p.client}</span>
                                                        <h4 className="text-xl font-black uppercase tracking-tighter italic">{p.title}</h4>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </section>

                                <section id="contact" className="py-40 px-6 md:px-20 bg-zinc-950/80 backdrop-blur-lg relative z-10">
                                    <div className="max-w-5xl mx-auto text-center px-6">
                                       <h2 className="text-5xl md:text-8xl font-black uppercase mb-10 italic leading-none text-white">CRÉONS <br /> <span className="bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-cyan-400">L'IMAGE.</span></h2>
                                       <div className="max-w-xl mx-auto mt-20 text-left">
                                           <form action="https://formspree.io/f/mreyqdnn" method="POST" className="space-y-12">
                                               <div><label className="block text-gray-400 text-[11px] font-mono tracking-[0.4em] mb-2 uppercase">NOM COMPLET</label>
                                               <input name="nom" type="text" required className="w-full bg-transparent border-b border-white/10 py-3 text-white focus:outline-none focus:border-cyan-400 transition-colors uppercase" /></div>
                                               <div><label className="block text-gray-400 text-[11px] font-mono tracking-[0.4em] mb-2 uppercase">EMAIL DE CONTACT</label>
                                               <input name="email" type="email" required className="w-full bg-transparent border-b border-white/10 py-3 text-white focus:outline-none focus:border-cyan-400 transition-colors uppercase" /></div>
                                               <div><label className="block text-gray-400 text-[11px] font-mono tracking-[0.4em] mb-2 uppercase">DÉTAILS DU PROJET</label>
                                               <textarea name="message" rows="2" required className="w-full bg-transparent border-b border-white/10 py-3 text-white focus:outline-none focus:border-cyan-400 transition-colors resize-none uppercase"></textarea></div>
                                               <button type="submit" className="w-full mt-8 py-6 border border-cyan-400 text-cyan-400 font-black uppercase tracking-[0.3em] text-[10px] md:text-xs hover:bg-cyan-400 hover:text-black transition-all">ENVOYER LE BRIEFING</button>
                                           </form>
                                       </div>
                                       <div className="flex justify-center gap-12 mt-24">
                                          <a href="https://www.instagram.com/lancelot_production" target="_blank" className="text-gray-500 hover:text-cyan-400 transition-colors"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg></a>
                                          <a href="https://youtube.com/@lancelotprod" target="_blank" className="text-gray-500 hover:text-red-500 transition-colors"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M2.5 17a24.12 24.12 0 0 1 0-10 2 2 0 0 1 2-2 103.03 103.03 0 0 1 15 0 2 2 0 0 1 2 2 24.12 24.12 0 0 1 0 10 2 2 0 0 1-2 2 103.03 103.03 0 0 1-15 0 2 2 0 0 1-2-2z"/><path d="m10 15 5-3-5-3z"/></svg></a>
                                          <a href="https://www.linkedin.com/in/lancelot-cavalec" target="_blank" className="text-gray-500 hover:text-blue-500 transition-colors"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg></a>
                                       </div>
                                       <p className="mt-24 text-[10px] font-mono text-gray-700 uppercase tracking-[0.5em]">© 2024 — Lancelot Production / Lancelot Cavalec</p>
                                    </div>
                                </section>
                            </motion.div>
                        ) : (
                            <ProjectPage project={selectedProject} onBack={() => setSelectedProject(null)} />
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
